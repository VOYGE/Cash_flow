{% extends "cashflow/base.html" %}

{% block content %}

<h2>Удаление записи</h2>

<p>
    Вы действительно хотите удалить запись
    <strong>{{ object }}</strong>?
</p>

<form method="post">

    {% csrf_token %}

    <button class="btn btn-danger">
        Удалить
    </button>

    <a href="{% url 'cashflow_list' %}"
       class="btn btn-secondary">

        Отмена

    </a>

</form>

{% endblock %}
